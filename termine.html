<style>
.topbar-right { display: flex; gap: 8px; align-items: center; }
.btn { padding: 7px 15px; border-radius: 8px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; border: none; transition: all 0.12s; display: inline-flex; align-items: center; gap: 6px; }
.btn-blue { background: var(--accent); color: var(--text); font-weight: 600; }
.btn-blue:hover { background: #b8c930; }
.btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--soft); }
.cal-layout { display: grid; grid-template-columns: 405px 1fr; flex: 1; }
.cal-left { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.month-nav { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 16px 18px 10px; }
.month-title { font-size: 19px; font-weight: 600; letter-spacing: -0.3px; }
.nav-arrow { width: 28px; height: 28px; border-radius: 50%; border: none; background: transparent; cursor: pointer; font-size: 16px; color: var(--accent); display: flex; align-items: center; justify-content: center; transition: background 0.12s; }
.nav-arrow:hover { background: var(--accent-pale); }
.weekdays { display: grid; grid-template-columns: 31px repeat(7, 1fr); padding: 0 13px; margin-bottom: 4px; }
.wd { font-size: 11px; font-weight: 600; color: var(--muted); text-align: center; padding: 4px 0; letter-spacing: 0.3px; }
.wd.sun { color: var(--red); }
.wd.kw-head { font-size: 9px; font-weight: 500; color: transparent; }
.days-grid { display: grid; grid-template-columns: 31px repeat(7, 1fr); padding: 0 13px 18px; row-gap: 0; column-gap: 2px; }
.cal-week-sep { grid-column: 1 / -1; height: 1.5px; background: rgba(0,0,0,0.20); margin: 3px 0; }
.kw-cell { display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; color: #7B1C2E; line-height: 1; padding-right: 2px; }
.day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; position: relative; transition: background 0.1s; }
.day-cell:hover:not(.empty):not(.today):not(.selected) { background: var(--soft); }
.day-cell .day-nr { font-size: 15px; font-weight: 400; color: var(--text); line-height: 1; }
.day-cell.other-month .day-nr { color: #C7C7CC; }
.day-cell.sunday .day-nr { color: var(--red); }
.day-cell.today .day-nr { background: var(--accent); color: #fff; width: 33px; height: 33px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; }
.day-cell.selected:not(.today) .day-nr { background: var(--soft); width: 33px; height: 33px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; color: var(--accent); }
.day-cell.has-events::after { content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
.day-cell.today.has-events::after { background: rgba(255,255,255,0.8); }
.mini-list { flex: 1; border-top: 1px solid var(--border); overflow-y: auto; }
.mini-list-head { padding: 12px 20px 6px; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
.mini-event { display: flex; align-items: center; gap: 10px; padding: 9px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
.mini-event:last-child { border-bottom: none; }
.mini-event:hover { background: var(--soft); }
.mini-event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mini-event-title { font-size: 13px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-event-time { font-size: 11.5px; color: var(--muted); white-space: nowrap; }
.mini-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }
.cal-right { display: flex; flex-direction: column; overflow: hidden; }
.day-header { padding: 20px 28px 16px; border-bottom: 1px solid var(--border); background: var(--surface); }
.day-header-date { font-size: 28px; font-weight: 300; letter-spacing: -0.5px; }
.day-header-date strong { font-weight: 600; color: var(--accent); }
.day-header-weekday { font-size: 13px; color: var(--muted); margin-top: 2px; }
.time-grid { flex: 1; overflow-y: auto; position: relative; }
.time-slot { display: flex; min-height: 56px; border-bottom: 1px solid var(--border); }
.time-label { width: 60px; padding: 6px 12px 0 0; text-align: right; font-size: 11px; color: var(--muted); flex-shrink: 0; font-weight: 400; line-height: 1; }
.time-content { flex: 1; position: relative; border-left: 1px solid var(--border); padding: 4px 12px 4px 8px; }
.time-now-line { position: absolute; left: 60px; right: 0; height: 2px; background: var(--red); z-index: 5; }
.time-now-dot { position: absolute; left: 54px; width: 10px; height: 10px; border-radius: 50%; background: var(--red); transform: translateY(-4px); z-index: 5; }
.event-block { border-radius: 6px; padding: 5px 8px; margin-bottom: 3px; cursor: pointer; transition: opacity 0.1s; position: relative; }
.event-block:hover { opacity: 0.85; }
.event-block-title { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.event-block-sub { font-size: 11px; opacity: 0.85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
.overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 18px; width: 100%; max-width: 460px; padding: 28px; box-shadow: 0 24px 64px rgba(0,0,0,.18); animation: pop .18s ease-out; }
@keyframes pop { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: var(--soft); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 16px; color: var(--muted); display: flex; align-items: center; justify-content: center; }
.modal-close:hover { color: var(--text); }
.field { margin-bottom: 14px; }
.field label { font-size: 12px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 5px; }
.field input, .field select, .field textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 9px; font-family: inherit; font-size: 13.5px; color: var(--text); background: var(--bg); outline: none; transition: border 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: var(--surface); }
.field textarea { resize: none; height: 72px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; }
.btn-danger { background: transparent; color: var(--red); border: none; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; padding: 7px 0; }
.btn-danger:hover { text-decoration: underline; }
.color-picker { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.cp-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.12s, box-shadow 0.12s; flex-shrink: 0; }
.cp-dot:hover { transform: scale(1.18); }
.cp-dot.on { border-color: var(--text); box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--text); transform: scale(1.1); }
.cp-custom { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px dashed var(--border); background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red); overflow: hidden; position: relative; flex-shrink: 0; transition: transform 0.12s; }
.cp-custom:hover { transform: scale(1.18); }
.cp-custom input[type="color"] { position: absolute; inset: -4px; opacity: 0; cursor: pointer; width: 200%; height: 200%; }
.cp-custom.on { box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--text); }
.btn-sync-mob { display: none; background: rgba(255,255,255,.07); border: 1px solid var(--border); border-radius: 10px; width: 36px; height: 36px; align-items: center; justify-content: center; color: var(--text); cursor: pointer; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
.btn-sync-mob:active { opacity: 0.7; }
.detail-row { display: flex; gap: 10px; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid var(--border); }
.detail-row:last-child { border-bottom: none; }
.detail-icon { font-size: 15px; color: var(--muted); width: 18px; flex-shrink: 0; margin-top: 1px; }
.detail-val { font-size: 13.5px; }
.kunde-wrap { position: relative; }
.kunde-dd { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; box-shadow: 0 8px 24px rgba(0,0,0,.12); z-index: 300; max-height: 220px; overflow-y: auto; display: none; }
.kunde-dd-item { padding: 9px 12px; cursor: pointer; border-bottom: 1px solid var(--border); }
.kunde-dd-item:last-child { border-bottom: none; }
.kunde-dd-item:hover { background: var(--soft); }
.kunde-dd-name { font-size: 13px; font-weight: 500; }
.kunde-dd-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
/* View Toggle */
.cal-view-toggle { display:flex; background:var(--soft); border-radius:8px; padding:3px; gap:2px; }
.cal-vbtn { padding:4px 14px; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--muted); font-family:inherit; transition:all .12s; -webkit-tap-highlight-color:transparent; }
.cal-vbtn.on { background:var(--surface); color:var(--text); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.1); }
/* Wochenansicht */
.week-wrap { display:flex; flex-direction:column; flex:1; overflow:hidden; }
.week-nav { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.week-nav-title { font-size:14px; font-weight:600; }
.week-scroll { flex:1; overflow:auto; }
.week-grid-header { display:grid; grid-template-columns:52px repeat(7,1fr); min-width:500px; position:sticky; top:0; z-index:10; background:var(--surface); border-bottom:2px solid var(--border); }
.week-time-label-col { width:52px; border-right:1px solid var(--border); }
.week-col-head { text-align:center; padding:8px 4px 6px; border-left:1px solid var(--border); cursor:pointer; transition:background .1s; }
.week-col-head:hover { background:var(--soft); }
.week-col-head-day { font-size:10px; color:var(--muted); font-weight:600; letter-spacing:.5px; text-transform:uppercase; }
.week-col-head-day.sun { color:var(--red); }
.week-col-head-nr { font-size:22px; font-weight:300; line-height:1.2; width:36px; height:36px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; margin:2px auto 0; }
.week-col-head-nr.is-today { background:var(--accent); color:#fff; font-weight:600; font-size:17px; }
.week-allday-strip { display:none; grid-template-columns:52px repeat(7,1fr); min-width:500px; border-bottom:1px solid var(--border); }
.week-allday-cell { padding:2px 3px; border-left:1px solid var(--border); min-height:24px; }
.week-grid { display:grid; grid-template-columns:52px repeat(7,1fr); min-width:500px; }
.week-time-cell { padding:6px 6px 0 0; text-align:right; font-size:10.5px; color:var(--muted); border-right:1px solid var(--border); min-height:52px; line-height:1; }
.week-day-cell { border-left:1px solid var(--border); border-bottom:1px solid var(--border); padding:2px 3px; position:relative; min-height:52px; cursor:pointer; transition:background .1s; }
.week-day-cell:hover { background:rgba(200,217,58,.08); }
.week-event { border-radius:4px; padding:2px 5px; margin-bottom:2px; font-size:11px; font-weight:500; cursor:pointer; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; line-height:1.5; }
.week-event:hover { opacity:.82; }
/* Statistik */
.cal-stats { padding:8px 18px; border-top:1px solid var(--border); font-size:11.5px; color:var(--muted); flex-shrink:0; }
.cal-stats strong { color:var(--text); }
/* Wiederholung */
.wieder-hide { display:none !important; }
.wieder-section { border-top:1px solid var(--border); padding-top:12px; margin-top:4px; }
/* Mobile-Only View-Toggle (Desktop: ausgeblendet) */
.mob-view-toggle { display:none; }
/* Monats-Picker */
.month-title-btn { display:flex; align-items:center; gap:5px; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; background:none; border:none; font-family:inherit; padding:0; color:var(--text); }
.month-title-btn:active { opacity:0.7; }
.mp-chevron { transition:transform 0.2s; flex-shrink:0; color:var(--accent); }
.mp-chevron.open { transform:rotate(180deg); }

/* Jahresüberblick Modal */
.year-ov-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:600; display:flex; align-items:center; justify-content:center; animation:yearBdIn .28s ease forwards; }
.year-ov-backdrop.closing { animation:yearBdOut .22s ease forwards; }
@keyframes yearBdIn  { from{opacity:0} to{opacity:1} }
@keyframes yearBdOut { from{opacity:1} to{opacity:0} }
.year-ov { background:var(--surface); border-radius:20px; padding:22px 24px 24px; box-shadow:0 28px 72px rgba(0,0,0,.28); width:min(880px,94vw); max-height:92vh; overflow-y:auto; transform-origin:top center; animation:yearRollIn .35s cubic-bezier(0.22,1,0.36,1) forwards; }
.year-ov-backdrop.closing .year-ov { animation:yearRollOut .2s ease-in forwards; }
@keyframes yearRollIn  { from{opacity:0; transform:scaleY(0.06) translateY(-12px)} to{opacity:1; transform:scaleY(1) translateY(0)} }
@keyframes yearRollOut { from{opacity:1; transform:scaleY(1) translateY(0)} to{opacity:0; transform:scaleY(0.06) translateY(-12px)} }
.year-ov-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.year-ov-title { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
.year-ov-nav { display:flex; align-items:center; gap:8px; }
.year-ov-close { background:var(--soft); border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; font-size:18px; color:var(--muted); display:flex; align-items:center; justify-content:center; line-height:1; }
.year-ov-close:hover { background:var(--border); }
.year-ov-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
.year-ov-card { border-radius:12px; padding:10px 8px 8px; cursor:pointer; transition:background .12s, outline .12s; border:2px solid transparent; -webkit-tap-highlight-color:transparent; }
.year-ov-card:hover { background:var(--soft); }
.year-ov-card.active { background:rgba(200,217,58,.08); border-color:var(--accent); }
.year-ov-card-name { font-size:11.5px; font-weight:700; text-align:center; margin-bottom:5px; color:var(--text); letter-spacing:0.2px; }
.year-ov-wdays { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:1px; }
.year-ov-wd { font-size:7.5px; font-weight:600; color:var(--muted); text-align:center; padding-bottom:2px; }
.year-ov-wd.sun { color:var(--red); }
.year-ov-days { display:grid; grid-template-columns:repeat(7,1fr); row-gap:1px; }
.year-ov-day { font-size:9px; text-align:center; padding:2px 0; border-radius:50%; color:var(--text); line-height:1.7; }
.year-ov-day.empty { color:transparent; pointer-events:none; }
.year-ov-day.sun { color:var(--red); }
.year-ov-day.today { background:var(--accent); color:#fff !important; font-weight:700; border-radius:50%; }
.year-ov-day.other-m { color:#C7C7CC; }
@media(max-width:700px){ .year-ov-grid { grid-template-columns:repeat(3,1fr); gap:10px; } }
@media(max-width:440px){ .year-ov-grid { grid-template-columns:repeat(2,1fr); } }
</style>

<!-- mob-only-injected -->
<style>
@media (max-width: 768px) {
  .cal-layout { display: flex !important; flex-direction: column; }
  .cal-left { border-right: none !important; border-bottom: 1px solid var(--border); overflow: hidden; }
  .mini-list, .cal-stats { display: none !important; }
  /* Topbar: Heute + Exportieren + Importieren ausblenden, nur Terminvergabe + Sync */
  .topbar-right .btn-ghost { display: none !important; }
  .btn-sync-mob { display: flex !important; }
  /* View-Toggle aus Topbar ausblenden → erscheint im Kalender */
  .topbar-right .cal-view-toggle { display: none !important; }
  .mob-view-toggle { display: flex !important; background: var(--soft); border-radius: 8px; padding: 3px; gap: 2px; margin: 8px auto 4px; }
  /* Touch-Targets */
  .cal-vbtn { min-height: 40px; padding: 0 16px; }
  .nav-arrow { width: 40px; height: 40px; }
}
</style>
</head>

      <a class="nav-link" href="einstellungen.html"><span class="nav-icon"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> Einstellungen</a>

      <div class="nav-group-label">Werkzeuge</div>
      <a class="nav-link" href="werkzeuge.html"><span class="nav-icon"><svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></span> Werkzeuge</a>

  </div>

<main class="main">
  <div class="topbar">
    <div class="page-name">Termine</div>
    <div class="topbar-right">
      <button type="button" class="btn btn-ghost" onclick="goToday()">Heute</button>
      <button type="button" class="btn btn-ghost" onclick="exportICS()" title="Alle Termine als .ics exportieren – direkt in iOS Kalender importierbar">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Exportieren
      </button>
      <button type="button" class="btn btn-ghost" onclick="importICS()" title="Termine aus .ics Datei importieren (z. B. vom Smartphone-Kalender)">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Importieren
      </button>
      <!-- Sync-Button: nur Mobile sichtbar -->
      <button type="button" class="btn-sync-mob" onclick="openSyncSheet()" title="Kalender Sync">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <div class="cal-view-toggle">
        <button class="cal-vbtn on" data-view="monat" onclick="setCalView('monat')">Monat</button>
        <button class="cal-vbtn" data-view="woche" onclick="setCalView('woche')">Woche</button>
      </div>
      <button type="button" class="btn btn-blue" onclick="openModal()">Terminvergabe</button>
    </div>
  </div>
  <div class="cal-layout" id="calLayout">
    <div class="cal-left">
      <div class="mob-view-toggle">
        <button class="cal-vbtn on" data-view="monat" onclick="setCalView('monat')">Monat</button>
        <button class="cal-vbtn" data-view="woche" onclick="setCalView('woche')">Woche</button>
      </div>
      <div class="month-nav">
        <button type="button" class="nav-arrow" onclick="prevMonth()">‹</button>
        <button type="button" class="month-title-btn" onclick="toggleMonthPicker()">
          <span class="month-title" id="monthTitle"></span>
          <svg id="mpChevron" class="mp-chevron" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <button type="button" class="nav-arrow" onclick="nextMonth()">›</button>
      </div>
      <div id="monthPicker" class="month-picker" style="display:none;"></div>
      <div class="weekdays">
        <div class="wd kw-head">KW</div>
        <div class="wd">Mo</div><div class="wd">Di</div><div class="wd">Mi</div>
        <div class="wd">Do</div><div class="wd">Fr</div><div class="wd">Sa</div><div class="wd sun">So</div>
      </div>
      <div class="days-grid" id="daysGrid"></div>
      <div class="mini-list">
        <div class="mini-list-head" id="miniHead">Heute</div>
        <div id="miniList"></div>
      </div>
      <div class="cal-stats" id="calStats"></div>
    </div>
    <div class="cal-right">
      <div class="day-header">
        <div class="day-header-date" id="dayHeaderDate"></div>
        <div class="day-header-weekday" id="dayHeaderWeekday"></div>
      </div>
      <div class="time-grid" id="timeGrid"></div>
    </div>
  </div>
  <div id="weekView" style="display:none" class="week-wrap">
    <div class="week-nav">
      <button class="nav-arrow" onclick="prevWeek()">‹</button>
      <div class="week-nav-title" id="weekNavTitle"></div>
      <button class="nav-arrow" onclick="nextWeek()">›</button>
    </div>
    <div class="week-scroll" id="weekScroll">
      <div id="weekGridHeader" class="week-grid-header"><div class="week-time-label-col"></div></div>
      <div id="weekAlldayStrip" class="week-allday-strip"></div>
      <div id="weekGrid" class="week-grid"></div>
    </div>
  </div>
</main>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Neuer Termin</div>
      <button type="button" class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="detail-view" style="display:none;">
      <div id="detail-content"></div>
      <div class="modal-actions">
        <button type="button" class="btn-danger" id="btn-delete">Löschen</button>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
          <button type="button" class="btn btn-ghost" id="btn-fahrt" style="color:var(--dark);font-weight:600;">🚗 Fahrt erfassen</button>
          <button type="button" class="btn btn-ghost" id="btn-dup">Duplizieren</button>
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Schließen</button>
          <button type="button" class="btn btn-blue" id="btn-edit">Bearbeiten</button>
        </div>
      </div>
    </div>
    <div id="edit-view">
      <div class="field"><label>Titel *</label><div class="kunde-wrap"><input type="text" id="f-titel" placeholder="z. B. Fensterreinigung" oninput="titelTerminInput(this.value)" autocomplete="off"><div class="kunde-dd" id="titelTerminDd"></div></div></div>
      <div class="field-row">
        <div class="field"><label>Datum</label><input type="date" id="f-datum"></div>
        <div class="field"><label>Ganztägig</label><select id="f-ganztag" onchange="toggleTime()"><option value="nein">Nein</option><option value="ja">Ja</option></select></div>
      </div>
      <div id="time-fields" class="field-row">
        <div class="field"><label>Von</label><input type="time" id="f-von" value="08:00"></div>
        <div class="field"><label>Bis</label><input type="time" id="f-bis" value="09:00"></div>
      </div>
      <div class="field"><label>Kunde / Ort</label><div class="kunde-wrap"><input type="text" id="f-kunde" placeholder="z. B. Familie Hoffmann, Kastanienweg 4" oninput="kundeTerminInput(this.value)" autocomplete="off"><div class="kunde-dd" id="kundeTerminDd"></div></div></div>
      <div class="field"><label>Notiz</label><textarea id="f-notiz" placeholder="Schlüssel, Parkplatz, Besonderheiten …"></textarea></div>
      <div class="field"><label>Farbe</label><div class="color-picker" id="colorPicker"></div></div>
      <div class="wieder-section" id="wieder-section">
        <div class="field-row">
          <div class="field"><label>Wiederholung</label>
            <select id="f-wieder" onchange="toggleWieder()">
              <option value="">Keine</option>
              <option value="daily">Täglich</option>
              <option value="weekly">Wöchentlich</option>
              <option value="monthly">Monatlich</option>
              <option value="yearly">Jährlich</option>
            </select>
          </div>
          <div class="field wieder-hide" id="wieder-bis-field"><label>Enddatum</label><input type="date" id="f-wieder-bis"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-danger" id="btn-delete-edit" style="visibility:hidden;">Löschen</button>
        <div style="display:flex;gap:8px;">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
          <button type="button" class="btn btn-blue" onclick="saveTermin()">Speichern</button>
        </div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="icsFileInput" accept=".ics,text/calendar" style="display:none" onchange="_handleICSFile(this)">
<div id="yearOvBackdrop" style="display:none;" class="year-ov-backdrop" onclick="closeYearOv(event)">
  <div class="year-ov" onclick="event.stopPropagation()">
    <div class="year-ov-head">
      <div class="year-ov-nav">
        <button class="nav-arrow" onclick="yearOvPrev()">‹</button>
        <span class="year-ov-title" id="yearOvTitle"></span>
        <button class="nav-arrow" onclick="yearOvNext()">›</button>
      </div>
      <button class="year-ov-close" onclick="closeYearOv()">×</button>
    </div>
    <div class="year-ov-grid" id="yearOvGrid"></div>
  </div>
</div>
<script src="js/termine.js?v=202606260047"></script>
</body>
</html>
