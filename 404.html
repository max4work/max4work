<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="icon" href="logo.png" type="image/png">
<link rel="manifest" href="manifest.json">
<title>Seite nicht gefunden – max4work</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script>
  (function(){
    var s = localStorage.getItem('max4work_color_scheme') || 'system';
    var dark = s === 'dark' || (s === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    if (dark) document.documentElement.setAttribute('data-scheme', 'dark');
  })();
</script>
<style>
  :root {
    --bg: #F2F3F0; --surface: #FFFFFF; --border: #E4E6E2;
    --text: #1A1C18; --muted: #7B8278; --accent: #C8D93A; --r: 14px;
  }
  [data-scheme="dark"] {
    --bg: #111312; --surface: #1C1F1B; --border: #2A2D28;
    --text: #E8EAE4; --muted: #7B8278;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    text-align: center;
    padding: 40px 24px;
    max-width: 400px;
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 48px;
    text-decoration: none;
    color: var(--text);
  }
  .brand-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }
  .brand-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }
  .code {
    font-size: 72px;
    font-weight: 600;
    letter-spacing: -4px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 10px;
  }
  p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    background: var(--accent);
    color: #1A1C18;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: var(--r);
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.12s;
  }
  .btn:hover { opacity: 0.88; }
</style>
</head>
<body>
<div class="wrap">
  <a class="brand" href="index.html">
    <span class="brand-dot"></span>
    <span class="brand-name">max4work</span>
  </a>
  <div class="code">404</div>
  <h1>Seite nicht gefunden</h1>
  <p>Die aufgerufene Seite existiert nicht oder wurde verschoben.</p>
  <a class="btn" href="index.html">← Zum Dashboard</a>
</div>
</body>
</html>
