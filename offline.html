<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#C8D93A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Offline – max4work</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Outfit', sans-serif;
    background: #F2F2F7;
    color: #1C1C1E;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 32px 24px;
    padding-top: calc(32px + env(safe-area-inset-top, 0px));
    padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  .icon {
    width: 72px;
    height: 72px;
    background: #FFFFFF;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,.1);
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.4px;
    margin-bottom: 10px;
  }
  p {
    font-size: 15px;
    color: #6C6C70;
    line-height: 1.55;
    max-width: 280px;
    margin: 0 auto 32px;
  }
  .btn {
    display: inline-block;
    background: #C8D93A;
    color: #1a1a1a;
    font-weight: 700;
    font-size: 15px;
    padding: 13px 28px;
    border-radius: 14px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    transition: opacity .15s;
  }
  .btn:active { opacity: .8; }
  .note {
    margin-top: 20px;
    font-size: 12px;
    color: #AEAEB2;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="icon">
  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#C8D93A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 6s4-2 11-2 11 2 11 2"/><path d="M1 18s4 2 11 2 11-2 11-2"/>
    <line x1="1" y1="6" x2="1" y2="18"/><line x1="23" y1="6" x2="23" y2="18"/>
    <line x1="12" y1="2" x2="12" y2="22"/>
  </svg>
</div>
<h1>Kein Internet</h1>
<p>Du bist gerade offline. Deine Daten in max4work bleiben gespeichert und sind verfügbar, sobald du wieder verbunden bist.</p>
<button class="btn" onclick="location.reload()">Erneut versuchen</button>
<p class="note">Alle deine Rechnungen, Kunden und Belege<br>sind sicher in deinem Gerät gespeichert.</p>
</body>
</html>
